name: Build APK

on:
  push:
    branches: ["master"]
    tags: ["v*"]
  pull_request:
    branches: ["master"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SIGNING_STORE_BASE64: ${{ secrets.SIGNING_STORE_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        if: env.SIGNING_STORE_BASE64 != ''
        run: |
          echo "$SIGNING_STORE_BASE64" | base64 -d > "${{ runner.temp }}/release.keystore"
          chmod 600 "${{ runner.temp }}/release.keystore"
          echo "SIGNING_STORE_FILE=${{ runner.temp }}/release.keystore" >> "$GITHUB_ENV"

      - name: Build release APK
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Prepare release artifact name
        run: |
          mkdir -p build-output
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk build-output/SamsungTVRemote-release.apk
          elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk build-output/SamsungTVRemote-release-unsigned.apk
          else
            echo "No release APK found" >&2
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: build-output/*.apk

      - name: Publish latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          prerelease: true
          files: build-output/*.apk

      - name: Publish versioned release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build-output/*.apk

      - name: Cleanup keystore
        if: always()
        run: rm -f "${{ runner.temp }}/release.keystore"
