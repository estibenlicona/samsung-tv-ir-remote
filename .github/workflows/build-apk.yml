name: Build APK

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APKs
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk SamsungTVRemote-debug.apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk SamsungTVRemote-release-unsigned.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-builds
          path: |
            SamsungTVRemote-debug.apk
            SamsungTVRemote-release-unsigned.apk
          retention-days: 90

      - name: Publish latest master release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build (master)
          prerelease: true
          files: |
            SamsungTVRemote-debug.apk
            SamsungTVRemote-release-unsigned.apk
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish tagged release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            SamsungTVRemote-debug.apk
            SamsungTVRemote-release-unsigned.apk
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}
